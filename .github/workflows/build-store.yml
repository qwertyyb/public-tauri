name: Build Store

on:
  push:
    branches: [master]
    paths:
      - 'store/plugins/**/package.json'

jobs:
  build-store:
    runs-on: ubuntu-latest
    # 无此项时 GITHUB_TOKEN 往往只有 read，git push 会 403
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 在分支上检出有名称的分支，便于 commit 后 push；不要用默认的纯 SHA  detached HEAD
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build store index
        run: pnpm store:build

      - name: Commit and push store/index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store/index.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(store): auto-update index.json"
            git push origin "HEAD:${{ github.ref_name }}"
          else
            echo "No changes to commit, store/index.json is up to date"
          fi
