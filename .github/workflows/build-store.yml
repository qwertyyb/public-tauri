name: Build Store

on:
  workflow_run:
    workflows: [Publish npm Packages]
    types: [completed]
  workflow_dispatch:

jobs:
  build-store:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master') }}
    runs-on: ubuntu-latest
    # 无此项时 GITHUB_TOKEN 往往只有 read，git push 会 403
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 在分支上检出有名称的分支，便于 commit 后 push；不要用默认的纯 SHA  detached HEAD
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check store plugin package changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version_changes="$(python3 <<'PY'
          import json
          import subprocess

          base = "${{ github.event.workflow_run.head_sha }}^1"
          head = "${{ github.event.workflow_run.head_sha }}"

          result = subprocess.run(
              ['git', 'diff', '--name-only', base, head, '--', 'store/plugins/**/package.json'],
              check=True,
              capture_output=True,
              text=True,
          )

          changed = []
          for file_path in result.stdout.splitlines():
              def read_version(rev):
                  show = subprocess.run(
                      ['git', 'show', f'{rev}:{file_path}'],
                      capture_output=True,
                      text=True,
                  )
                  if show.returncode != 0:
                      return None
                  return json.loads(show.stdout).get('version')

              before = read_version(base)
              after = read_version(head)
              if before != after:
                  changed.append(f'{file_path}: {before} -> {after}')

          print('\n'.join(changed))
          PY
          )"

          if [ -n "$version_changes" ]; then
            echo "$version_changes"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No store plugin package version changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.changes.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build store index
        if: steps.changes.outputs.changed == 'true'
        run: pnpm dlx tsx scripts/build-store.ts

      - name: Commit and push store/index.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store/index.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(store): auto-update index.json"
            git push origin "HEAD:master"
          else
            echo "No changes to commit, store/index.json is up to date"
          fi
