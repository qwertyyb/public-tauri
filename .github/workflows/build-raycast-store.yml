name: Build Raycast Store

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-raycast-store.yml'

jobs:
  build-raycast-store:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Raycast extensions
        uses: actions/checkout@v4
        with:
          repository: raycast/extensions
          ref: main
          path: .tmp/raycast-extensions
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Raycast store index
        run: pnpm dlx tsx scripts/build-raycast-store.ts --raycast-root .tmp/raycast-extensions --out store/raycast/index.json

      - name: Commit and push Raycast store index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store/raycast/index.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(raycast-store): auto-update index.json"
            git push origin "HEAD:${{ github.ref_name }}"
          else
            echo "No changes to commit, store/raycast/index.json is up to date"
          fi
